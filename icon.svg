<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景圆 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- 剪贴板图标 -->
  <!-- 纸板 -->
  <rect x="140" y="120" width="260" height="320" rx="24" fill="white" opacity="0.95"/>
  <!-- 纸板顶部条 -->
  <rect x="140" y="120" width="260" height="60" rx="24" fill="#e2e8f0"/>
  <rect x="140" y="156" width="260" height="24" fill="#e2e8f0"/>
  <!-- 剪贴板夹 -->
  <rect x="180" y="88" width="52" height="50" rx="10" fill="#cbd5e1"/>
  <rect x="210" y="88" width="52" height="50" rx="10" fill="#94a3b8"/>

  <!-- 列表行 -->
  <rect x="175" y="208" width="190" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="175" y="240" width="150" height="14" rx="7" fill="#e2e8f0"/>
  <rect x="175" y="274" width="190" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="175" y="306" width="150" height="14" rx="7" fill="#e2e8f0"/>
  <rect x="175" y="340" width="190" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="175" y="372" width="120" height="14" rx="7" fill="#e2e8f0"/>

  <!-- 勾选标记 -->
  <circle cx="310" cy="278" r="22" fill="#16a34a"/>
  <polyline points="296,278 305,288 324,266" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 十字医疗标记 -->
  <rect x="230" y="398" width="60" height="16" rx="8" fill="#ef4444" transform="rotate(0)"/>
  <rect x="252" y="382" width="16" height="48" rx="8" fill="#ef4444" transform="rotate(0)"/>
</svg>
